<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>查單系統｜LAI家便當</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-app-body" data-admin-page="orders">
  <header class="ops-topbar">
    <div class="ops-brand">
      <img src="assets/lai-brand-logo.svg" alt="LAI家便當">
      <div><strong>查單系統</strong><span>手機、訂單號、姓名、品項快速查詢</span></div>
    </div>
    <nav class="ops-nav" aria-label="加盟後台功能">
      <a href="admin.html">接單工作台</a>
      <a class="active" href="admin-orders.html">查單系統</a>
      <a href="admin-stats.html">營業統計</a>
      <a href="admin-print.html">列印設定</a>
    </nav>
    <div class="ops-top-actions">
      <time id="adminClock">--:--</time>
      <button class="admin-refresh" type="button">重新整理</button>
    </div>
  </header>

  <main class="ops-console">
    <section class="ops-toolbar order-search-toolbar" aria-label="訂單查詢">
      <div class="search-box">
        <input id="pageSearch" type="search" inputmode="search" autocomplete="off" placeholder="輸入手機末幾碼、訂單號、姓名、公司、品項">
        <select id="pageStatus">
          <option value="all">全部狀態</option>
          <option value="pending">新單待接</option>
          <option value="preparing">製作中</option>
          <option value="ready">可取餐</option>
          <option value="completed">已完成</option>
          <option value="rejected">已拒單</option>
          <option value="cancelled">已取消</option>
        </select>
        <input id="pageDate" type="date">
      </div>
      <div class="search-hints" id="searchHints"></div>
    </section>

    <section class="ops-stats order-search-stats">
      <article><span>符合筆數</span><strong id="pageCount">0</strong></article>
      <article><span>查詢金額</span><strong id="pageRevenue">$0</strong></article>
      <article><span>查詢份數</span><strong id="pageItems">0</strong></article>
      <article><span>最近訂單</span><strong id="pageLatest">--</strong></article>
    </section>

    <section class="ops-panel">
      <div class="column-head">
        <h2>訂單列表</h2>
        <span>點擊查看</span>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-data-table orders-data-table">
          <thead>
            <tr>
              <th>取餐時間</th>
              <th>訂單編號</th>
              <th>客戶</th>
              <th>手機</th>
              <th>品項</th>
              <th>金額</th>
              <th>狀態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="ordersTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="orderDetailModal" class="admin-detail-modal" aria-hidden="true">
    <div class="admin-detail-backdrop" data-close-order-detail></div>
    <article class="admin-detail-panel" role="dialog" aria-modal="true" aria-labelledby="detailOrderTitle">
      <button class="dish-modal-close" type="button" data-close-order-detail aria-label="關閉">×</button>
      <header>
        <div>
          <p class="eyebrow">ORDER DETAIL</p>
          <h2 id="detailOrderTitle">訂單明細</h2>
        </div>
        <span id="detailStatus" class="table-status">--</span>
      </header>
      <div id="detailBody" class="admin-detail-body"></div>
    </article>
  </div>

  <script src="admin-pages.js"></script>
</body>
</html>
